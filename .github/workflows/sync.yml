name: Sync Loon Rules

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Convert rules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/convert.py

      - name: Render public Loon template
        run: |
          python scripts/render_loon_template.py \
            --template templates/loon/loon_hybrid_optimized.conf \
            --variables templates/loon/variables.public.yml \
            --output generated/loon_hybrid_optimized.conf

      - name: Commit generated rules and configs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/ build/summary.md generated/loon_hybrid_optimized.conf
          git diff --cached --quiet || git commit -m "Update generated Loon rules and config"
          git push
