rules:
  # Local/direct and update infrastructure first.
  - DOMAIN,raw.githubusercontent.com,主代理
  - DOMAIN-SUFFIX,githubusercontent.com,主代理
  - DOMAIN-SUFFIX,github.com,主代理
  - DOMAIN-SUFFIX,github.io,主代理
  - DOMAIN-SUFFIX,jsdelivr.net,主代理
  - DOMAIN,<PERSONAL_DIRECT_DOMAIN>,PERSONAL_DIRECT
  - DOMAIN-SUFFIX,<PERSONAL_DIRECT_DOMAIN>,PERSONAL_DIRECT
  - IP-CIDR,<WG_PRIVATE_CIDR>,WG_PRIVATE,no-resolve

  # Reject/hijacking first.
  - RULE-SET,hijacking-plus,REJECT

  # Sensitive overseas categories before broad direct rules.
  - RULE-SET,gemini,AI
  - RULE-SET,grok,AI
  - RULE-SET,copilot,AI
  - RULE-SET,apple-ai,AI
  - RULE-SET,openai,AI
  - RULE-SET,claude,AI
  - RULE-SET,crypto,Crypto
  - RULE-SET,binance,Crypto
  - RULE-SET,okx,Crypto
  - RULE-SET,paypal,SENSITIVE_FIXED
  - RULE-SET,wise,SENSITIVE_FIXED
  - RULE-SET,monzo,SENSITIVE_FIXED
  - RULE-SET,revolut,SENSITIVE_FIXED
  - RULE-SET,bank-hk,BANK-HK
  - RULE-SET,bank-sg,BANK-SG
  - RULE-SET,bank-us,BANK-US
  - RULE-SET,bank-de,BANK-DE

  # Domestic/system direct layer.
  - RULE-SET,apple,DIRECT
  - RULE-SET,microsoft-apps,DIRECT
  - RULE-SET,mac-app-upgrade,DIRECT
  - RULE-SET,geosite-cn,DIRECT
  - RULE-SET,china,DIRECT
  - GEOIP,CN,DIRECT

  # Blacklist-style final proxy.
  - MATCH,主代理
