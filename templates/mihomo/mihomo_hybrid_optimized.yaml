# Mihomo Hybrid Optimized Template
# Public-safe source template. Fill private values in Anders518/loon-conf-private.
#
# Design:
# - Mirrors current Loon logic: Lk2 + wd primary, ssd-bk manual backup, regional banks, AI, crypto, WireGuard-private routing.
# - Uses Accademia upstream Clash/Mihomo YAML rules directly where available.
# - Uses blackmatrix7 only for missing fallback categories: OpenAI, Claude, Crypto, Binance, OKX.

mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
ipv6: false

profile:
  store-selected: true
  store-fake-ip: false

find-process-mode: strict
unified-delay: true
tcp-concurrent: false
global-client-fingerprint: chrome

dns:
  enable: true
  prefer-h3: false
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: redir-host
  use-hosts: true
  use-system-hosts: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver-policy:
    geosite:cn:
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    +.<PERSONAL_DIRECT_DOMAIN>:
      - system
  fallback: []

proxy-providers:
<MIHOMO_PROXY_PROVIDER_LINES>

proxies:
<MIHOMO_STATIC_PROXY_LINES>

proxy-groups:
  - name: 主代理
    type: select
    proxies:
      - 香港策略
      - 台湾策略
      - 日本策略
      - 韩国策略
      - 新国策略
      - 美国策略
      - 德国策略
      - 游戏手动策略
      - 全球手动策略
      - 备用手动策略
      - DIRECT

  - name: WG_PRIVATE
    type: select
    proxies:
      - DIRECT
<MIHOMO_WG_PROXY_NAMES>

  - name: PERSONAL_DIRECT
    type: select
    proxies:
      - DIRECT

  - name: SENSITIVE_FIXED
    type: select
    proxies:
      - 美国节点
      - 新国节点
      - 香港节点
      - 德国节点
      - 备用手动策略
      - DIRECT

  - name: BANK-HK
    type: select
    proxies:
      - 香港节点
      - 备用香港节点
      - 备用手动策略
      - DIRECT

  - name: BANK-SG
    type: select
    proxies:
      - 新国节点
      - 备用新国节点
      - 备用手动策略
      - DIRECT

  - name: BANK-US
    type: select
    proxies:
      - 美国节点
      - 备用美国节点
      - 备用手动策略
      - DIRECT

  - name: BANK-DE
    type: select
    proxies:
      - 德国节点
      - 备用德国节点
      - 备用手动策略
      - DIRECT

  - name: Crypto
    type: select
    proxies:
      - 新国节点
      - 美国节点
      - 备用新国节点
      - 备用美国节点
      - 备用手动策略
      - DIRECT

  - name: AI
    type: select
    proxies:
      - 新国策略
      - 美国策略
      - 新国节点
      - 美国节点
      - 备用手动策略
      - DIRECT

  - name: Streaming
    type: select
    proxies:
      - 新国策略
      - 日本策略
      - 美国策略
      - 主代理
      - DIRECT

  - name: Social
    type: select
    proxies:
      - 主代理
      - 香港策略
      - 新国策略
      - 美国策略
      - DIRECT

  - name: Tools
    type: select
    proxies:
      - 主代理
      - 香港策略
      - 日本策略
      - 美国策略
      - DIRECT

  - name: 香港策略
    type: select
    proxies:
      - 香港时延优选
      - 香港节点
      - DIRECT

  - name: 台湾策略
    type: select
    proxies:
      - 台湾时延优选
      - 台湾节点
      - DIRECT

  - name: 日本策略
    type: select
    proxies:
      - 日本时延优选
      - 日本节点
      - DIRECT

  - name: 韩国策略
    type: select
    proxies:
      - 韩国时延优选
      - 韩国节点
      - DIRECT

  - name: 新国策略
    type: select
    proxies:
      - 新国时延优选
      - 新国节点
      - DIRECT

  - name: 美国策略
    type: select
    proxies:
      - 美国时延优选
      - 美国节点
      - DIRECT

  - name: 德国策略
    type: select
    proxies:
      - 德国时延优选
      - 德国节点
      - DIRECT

  - name: 游戏手动策略
    type: select
    proxies:
      - 游戏节点
      - 主代理
      - DIRECT

  - name: 全球手动策略
    type: select
    proxies:
      - 全球节点
      - 主代理
      - DIRECT

  - name: 备用手动策略
    type: select
    proxies:
      - 备用美国节点
      - 备用新国节点
      - 备用香港节点
      - 备用德国节点
      - 备用全部节点
      - DIRECT

  - name: 香港节点
    type: select
    include-all-providers: true
    filter: '^(?=.*((?i)🇭🇰|香港|(\b(HK|HKG|Hong)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'

  - name: 台湾节点
    type: select
    include-all-providers: true
    filter: '^(?=.*((?i)🇹🇼|台湾|(\b(TW|TWN|Tai|Taiwan)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'

  - name: 日本节点
    type: select
    include-all-providers: true
    filter: '^(?=.*((?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|(\b(JP|JPN|Japan)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'

  - name: 韩国节点
    type: select
    include-all-providers: true
    filter: '^(?=.*((?i)🇰🇷|韩国|韓|首尔|(\b(KR|KOR|Korea)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'

  - name: 新国节点
    type: select
    include-all-providers: true
    filter: '^(?=.*((?i)🇸🇬|新加坡|狮|(\b(SG|SGP|Singapore)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'

  - name: 美国节点
    type: select
    include-all-providers: true
    filter: '^(?=.*((?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|(\b(US|USA|United States)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'

  - name: 德国节点
    type: select
    include-all-providers: true
    filter: '^(?=.*((?i)🇩🇪|德国|德國|法兰克福|法蘭克福|(\b(DE|DEU|Germany|Frankfurt)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'

  - name: 游戏节点
    type: select
    include-all-providers: true
    filter: '^(?=.*((?i)游戏|🎮|(\b(GAME)(\d+)?\b)))(?!.*((?i)回国|校园)).*$'

  - name: 全球节点
    type: select
    include-all-providers: true
    filter: '^(?=.*(.))(?!.*((?i)群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|好友|失联|(\b(USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic)(\d+)?\b|(\d{4}-\d{2}-\d{2}|\dG)))).*$'

  - name: 备用香港节点
    type: select
    use:
<MIHOMO_BACKUP_PROVIDER_NAMES>
    filter: '^(?=.*((?i)🇭🇰|香港|(\b(HK|HKG|Hong)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'

  - name: 备用新国节点
    type: select
    use:
<MIHOMO_BACKUP_PROVIDER_NAMES>
    filter: '^(?=.*((?i)🇸🇬|新加坡|狮|(\b(SG|SGP|Singapore)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'

  - name: 备用美国节点
    type: select
    use:
<MIHOMO_BACKUP_PROVIDER_NAMES>
    filter: '^(?=.*((?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|(\b(US|USA|United States)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'

  - name: 备用德国节点
    type: select
    use:
<MIHOMO_BACKUP_PROVIDER_NAMES>
    filter: '^(?=.*((?i)🇩🇪|德国|德國|法兰克福|法蘭克福|(\b(DE|DEU|Germany|Frankfurt)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'

  - name: 备用全部节点
    type: select
    use:
<MIHOMO_BACKUP_PROVIDER_NAMES>
    filter: '^(?=.*(.))(?!.*((?i)群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|好友|失联|(\b(USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic)(\d+)?\b|(\d{4}-\d{2}-\d{2}|\dG)))).*$'

  - name: 香港时延优选
    type: url-test
    use:
<MIHOMO_PRIMARY_PROVIDER_NAMES>
    filter: '^(?=.*((?i)🇭🇰|香港|(\b(HK|HKG|Hong)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
