# Public example variables for rendering Loon and Mihomo templates.
#
# This file is safe for a public repository because it contains placeholders only.
# Create a local, private copy named `variables.private.yml` and replace the values there.
# Do not commit `variables.private.yml`.

repo_raw_root: "https://raw.githubusercontent.com/Anders518/loon-rules/main"

subscription:
  primary_names:
    - "primary-a"
    - "primary-b"
  primary_proxy_lines:
    - "primary-a = <SUBSCRIPTION_URL_PRIMARY_A>,parser-enabled=true,udp=true,block-quic=true,fast-open=default,vmess-aead=true,skip-cert-verify=true,enabled=true,flexible-sni=false"
    - "primary-b = <SUBSCRIPTION_URL_PRIMARY_B>,parser-enabled=true,udp=true,block-quic=true,fast-open=default,vmess-aead=true,skip-cert-verify=true,enabled=true,flexible-sni=false"
  backup_names:
    - "backup"
  backup_proxy_lines:
    - "backup = <SUBSCRIPTION_URL_BACKUP>,parser-enabled=true,udp=true,block-quic=true,fast-open=default,vmess-aead=true,skip-cert-verify=true,enabled=true,flexible-sni=false"

private:
  personal_direct_domain: "<PERSONAL_DIRECT_DOMAIN>"
  wg_node_names:
    - "wg-main"
  wg_proxy_lines:
    - "# Add full Loon WireGuard proxy lines in private storage only."
  wg_private_cidr: "<WG_PRIVATE_CIDR>"

mihomo:
  proxy_provider_lines:
    - "  primary-a:"
    - "    type: http"
    - "    url: <SUBSCRIPTION_URL_PRIMARY_A>"
    - "    path: ./providers/primary-a.yaml"
    - "    interval: 3600"
    - "    health-check: {enable: true, url: http://www.gstatic.com/generate_204, interval: 300}"
    - "  primary-b:"
    - "    type: http"
    - "    url: <SUBSCRIPTION_URL_PRIMARY_B>"
    - "    path: ./providers/primary-b.yaml"
    - "    interval: 3600"
    - "    health-check: {enable: true, url: http://www.gstatic.com/generate_204, interval: 300}"
    - "  backup:"
    - "    type: http"
    - "    url: <SUBSCRIPTION_URL_BACKUP>"
    - "    path: ./providers/backup.yaml"
    - "    interval: 3600"
    - "    health-check: {enable: true, url: http://www.gstatic.com/generate_204, interval: 300}"
  primary_provider_names:
    - "      - primary-a"
    - "      - primary-b"
  backup_provider_names:
    - "      - backup"
  static_proxy_lines:
    - "  # Add Mihomo static proxies here if needed."
  wg_proxy_names:
    - "      # - wg-main"

policy:
  main: "主代理"
  wg_private: "WG_PRIVATE"
  personal_direct: "PERSONAL_DIRECT"
  sensitive_fixed: "SENSITIVE_FIXED"
  bank_us: "BANK-US"
  crypto: "Crypto"
  ai: "AI"
  streaming: "Streaming"
  social: "Social"
  tools: "Tools"

general:
  ipv6_enabled: false
  dns_server: "system"
  allow_wifi_access: false
  wifi_access_http_port: 7222
  wifi_access_socks5_port: 7221
  url_test_interval: 300
  url_test_tolerance: 50
