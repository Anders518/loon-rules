IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
IP-CIDR,224.0.0.0/4,DIRECT,no-resolve

# 中国 GeoIP 兜底直连。若依赖 REGION_SPLITTER，可保留作为兜底。
GEOIP,CN,DIRECT

# 当前配置方向：黑名单 / 全局兜底代理。
# 若你要切换到更省电、更少 DNS 泄漏风险的白名单模式，改为 FINAL,DIRECT，并只让明确规则命中的境外服务走代理。
FINAL,主代理

