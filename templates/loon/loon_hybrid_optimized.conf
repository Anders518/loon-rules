# Loon Hybrid Optimized Template
#
# 公开安全版本：不包含真实订阅 URL、证书、内网节点、个人域名、敏感网站清单。
#
# 设计目标：
# - Accademia/Additional_Rule_For_Clash 优先；
# - 只引用本仓库 `rules/README.md` 中实际生成的规则文件；
# - 不再默认引用 blackmatrix7/ios_rule_script 与 rule.kelee.one 的重复规则；
# - 优先使用 Domain 规则；当前上游很多分类没有独立 IP 文件，避免引用不存在的 `_IP.list`；
# - 中国规则优先 GeositeCN / China 修正版；ChinaMax 仅作为按需增强，不默认启用；
# - Gemini 前置于 Google / 综合 AI / 其他大厂规则，避免被更宽泛规则提前命中；
# - 敏感网站固定节点访问，禁止负载均衡和自动切换；
# - WireGuard 仅作为内网访问策略，不参与普通代理兜底；
# - 个人调试域名强制 DIRECT，禁止经由代理节点；
# - 备用订阅只作为手动灾备入口，不参与任何自动选择、url-test、load-balance；
# - 默认保持黑名单兜底：FINAL,主代理。

[General]
# ============================================================
# 0. 核心运行模式：建议默认保留
# ============================================================
ip-mode = v4-only
ipv6-vif = off
sni-sniffing = true
disable-stun = true
test-timeout = 5
internet-test-url = http://connectivitycheck.platform.hicloud.com/generate_204
proxy-test-url = http://www.gstatic.com/generate_204
disconnect-on-policy-change = true

# ============================================================
# 1. DNS / 拒绝响应：集中管理，不要和插件重复打架
# ============================================================
# Loon 不能直接复刻 Clash nameserver-policy；如使用防 DNS 泄漏插件，避免再叠加另一套 DNS 分流插件。
dns-server = system
dns-reject-mode = LoopbackIP
domain-reject-mode = DNS
udp-fallback-mode = REJECT

# ============================================================
# 2. TUN / 局域网 / 个人调试域名：强制直连，不经代理节点
# ============================================================
skip-proxy = 192.168.0.0/16,172.16.0.0/12,localhost,*.local,<PERSONAL_DIRECT_DOMAIN>,*.<PERSONAL_DIRECT_DOMAIN>
bypass-tun = 100.64.0.0/10,127.0.0.0/8,169.254.0.0/16,172.16.0.0/12,192.0.0.0/24,192.0.2.0/24,192.88.99.0/24,192.168.0.0/16,198.51.100.0/24,203.0.113.0/24,224.0.0.0/4,255.255.255.255/32
real-ip = *.lan,*.local,localhost.*.qq.com,localhost.*.weixin.qq.com,pool.ntp.org,*.pool.ntp.org,ntp.*.com,time.*.com,stun.*,global.turn.twilio.com,global.stun.twilio.com,<PERSONAL_DIRECT_DOMAIN>,*.<PERSONAL_DIRECT_DOMAIN>

# ============================================================
# 3. 远程资源和数据源：建议保留
# ============================================================
resource-parser = https://raw.githubusercontent.com/sub-store-org/Sub-Store/release/sub-store-parser.loon.min.js
geoip-url = https://geodata.kelee.one/Country-Masaiki.mmdb
ipasn-url = https://geodata.kelee.one/GeoLite2-ASN-P3TERX.mmdb

# ============================================================
# 4. 管理/调试入口：按需启用
# ============================================================
allow-wifi-access = false
# wifi-access-http-port = 7222
# wifi-access-socks5-port = 7221
interface-mode = auto

[Proxy]
# WireGuard 内网节点：仅在 WG_PRIVATE 策略中使用。
# 这里注入 private.wg_proxy_lines，必须使用 Loon 官方 WireGuard 节点行格式。
<WG_PROXY_LINES>

[Remote Proxy]
# primary：日常主订阅，参与地区筛选、url-test、业务策略。
# backup：备用订阅，例如 ssd-bk。只作为手动灾备，不参与自动选择。
<PRIMARY> = <SUBSCRIPTION_URL_PRIMARY>,parser-enabled=true,udp=true,block-quic=true,fast-open=default,vmess-aead=true,skip-cert-verify=true,enabled=true,flexible-sni=false
<BACKUP> = <SUBSCRIPTION_URL_BACKUP>,parser-enabled=true,udp=true,block-quic=true,fast-open=default,vmess-aead=true,skip-cert-verify=true,enabled=true,flexible-sni=false

[Remote Filter]
# 日常节点池：只使用 primary，不包含 backup。
香港节点 = NameRegex,<PRIMARY>, FilterKey = "^(?=.*((?i)🇭🇰|香港|(\\b(HK|HKG|Hong)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
台湾节点 = NameRegex,<PRIMARY>, FilterKey = "^(?=.*((?i)🇹🇼|台湾|(\\b(TW|TWN|Tai|Taiwan)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
日本节点 = NameRegex,<PRIMARY>, FilterKey = "^(?=.*((?i)🇯🇵|日本|东京|大阪|(\\b(JP|JPN|Japan)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
韩国节点 = NameRegex,<PRIMARY>, FilterKey = "^(?=.*((?i)🇰🇷|韩国|首尔|(\\b(KR|KOR|Korea)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
新国节点 = NameRegex,<PRIMARY>, FilterKey = "^(?=.*((?i)🇸🇬|新加坡|狮|(\\b(SG|SGP|Singapore)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
美国节点 = NameRegex,<PRIMARY>, FilterKey = "^(?=.*((?i)🇺🇸|美国|洛杉矶|圣何塞|西雅图|芝加哥|(\\b(US|USA|United States)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
游戏节点 = NameRegex,<PRIMARY>, FilterKey = "^(?=.*((?i)游戏|🎮|(\\b(GAME)(\\d+)?\\b)))(?!.*((?i)回国|校园)).*$"
全球节点 = NameRegex,<PRIMARY>, FilterKey = "^(?=.*(.))(?!.*((?i)群|邀请|返利|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|通知|国内|地址|频道|说明|教程|更新|作者|(\\b(USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic)(\\d+)?\\b|\\d{4}-\\d{2}-\\d{2}|\\dG))).*$"

# 备用订阅池：只使用 backup，不参与任何 url-test / load-balance。
备用香港节点 = NameRegex,<BACKUP>, FilterKey = "^(?=.*((?i)🇭🇰|香港|(\\b(HK|HKG|Hong)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$"
备用台湾节点 = NameRegex,<BACKUP>, FilterKey = "^(?=.*((?i)🇹🇼|台湾|(\\b(TW|TWN|Tai|Taiwan)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$"
备用日本节点 = NameRegex,<BACKUP>, FilterKey = "^(?=.*((?i)🇯🇵|日本|东京|大阪|(\\b(JP|JPN|Japan)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$"
备用新国节点 = NameRegex,<BACKUP>, FilterKey = "^(?=.*((?i)🇸🇬|新加坡|狮|(\\b(SG|SGP|Singapore)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$"
备用美国节点 = NameRegex,<BACKUP>, FilterKey = "^(?=.*((?i)🇺🇸|美国|洛杉矶|圣何塞|西雅图|芝加哥|(\\b(US|USA|United States)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$"
备用全部节点 = NameRegex,<BACKUP>, FilterKey = "^(?=.*(.))(?!.*((?i)群|邀请|返利|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|过期|已用|联系|邮箱|工单|通知|国内|地址|频道|说明|教程|更新|作者|(\\b(USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic)(\\d+)?\\b|\\d{4}-\\d{2}-\\d{2}|\\dG))).*$"

[Proxy Group]
主代理 = select,香港策略,台湾策略,日本策略,韩国策略,新国策略,美国策略,游戏手动策略,全球手动策略,备用手动策略,DIRECT
WG_PRIVATE = select,DIRECT,<WG_NODE_NAMES>,img-url = server.rack
PERSONAL_DIRECT = select,DIRECT
SENSITIVE_FIXED = select,美国节点,新国节点,备用手动策略,DIRECT,img-url = lock.shield
BANK-US = select,美国节点,备用美国节点,备用手动策略,DIRECT,img-url = banknote
Crypto = select,新国节点,美国节点,备用新国节点,备用美国节点,备用手动策略,DIRECT,img-url = bitcoinsign.circle
AI = select,新国策略,美国策略,新国节点,美国节点,备用手动策略,DIRECT,img-url = person.circle
Streaming = select,新国策略,日本策略,美国策略,主代理,DIRECT
Social = select,主代理,香港策略,新国策略,美国策略,DIRECT
Tools = select,主代理,香港策略,日本策略,美国策略,DIRECT
香港策略 = select,香港时延优选,香港节点,DIRECT
台湾策略 = select,台湾时延优选,台湾节点,DIRECT
日本策略 = select,日本时延优选,日本节点,DIRECT
韩国策略 = select,韩国时延优选,韩国节点,DIRECT
新国策略 = select,新国时延优选,新国节点,DIRECT
美国策略 = select,美国时延优选,美国节点,DIRECT
游戏手动策略 = select,游戏节点,主代理,DIRECT
全球手动策略 = select,全球节点,主代理,DIRECT
备用手动策略 = select,备用美国节点,备用新国节点,备用香港节点,备用台湾节点,备用日本节点,备用全部节点,DIRECT
香港时延优选 = url-test,香港节点,interval = 300,tolerance = 50
台湾时延优选 = url-test,台湾节点,interval = 300,tolerance = 50
日本时延优选 = url-test,日本节点,interval = 300,tolerance = 50
韩国时延优选 = url-test,韩国节点,interval = 300,tolerance = 50
新国时延优选 = url-test,新国节点,interval = 300,tolerance = 50
美国时延优选 = url-test,美国节点,interval = 300,tolerance = 50

