# https://raw.githubusercontent.com/Anders518/loon-rules/main/rules/GFW/GFW_Domain.list, policy=主代理, tag=GFW Domain, enabled=false

[Rule]
# 个人调试域名：本地替换为真实域名；必须放在远程规则和 FINAL 前。
DOMAIN,<PERSONAL_DIRECT_DOMAIN>,PERSONAL_DIRECT
DOMAIN-SUFFIX,<PERSONAL_DIRECT_DOMAIN>,PERSONAL_DIRECT

# WireGuard 内网 CIDR：本地替换为真实 CIDR，例如 10.x.0.0/16。
IP-CIDR,<WG_PRIVATE_CIDR>,WG_PRIVATE,no-resolve

# 敏感网站：只在本地添加，不要提交公开仓库。示例：
# DOMAIN-SUFFIX,<SENSITIVE_BANK_DOMAIN>,SENSITIVE_FIXED
# DOMAIN-SUFFIX,<SENSITIVE_PAYMENT_DOMAIN>,SENSITIVE_FIXED
# DOMAIN-SUFFIX,<SENSITIVE_EXCHANGE_DOMAIN>,Crypto

# 个人高优先级规则示例：按需保留。
# DOMAIN-SUFFIX,example.jp,日本策略
# DOMAIN-KEYWORD,duolingo,主代理
# DOMAIN-KEYWORD,webank,DIRECT

# 前置直连
IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
IP-CIDR,224.0.0.0/4,DIRECT,no-resolve

# 中国 GeoIP 兜底直连。搭配 GeositeCN / China_Domain 使用。
GEOIP,CN,DIRECT

# 当前配置方向：黑名单 / 全局兜底代理。
# 若你要切换到更省电、更少 DNS 泄漏风险的白名单模式，改为 FINAL,DIRECT，并启用 GFW/海外服务明确规则。
FINAL,主代理

[Host]

[Rewrite]

[Script]

[Plugin]
# 插件建议本地维护；公开模板不写入个人使用清单。
# 注意：MITM、去广告、HTTPDNS、防 DNS 泄漏类插件之间可能重叠，启用前逐个验证。

[Mitm]
# 公开模板不保存证书、passphrase。
# 只有确实需要 Rewrite / Script 解密时才填写 hostname。
skip-server-cert-verify = false
hostname =
