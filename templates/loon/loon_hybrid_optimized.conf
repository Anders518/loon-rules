# Loon Hybrid Optimized Template
#
# Public-safe source template. Real subscription URLs, WireGuard secrets, personal domains,
# and sensitive domains belong in the private repo only.
#
# Rule source policy:
# - Accademia/Additional_Rule_For_Clash first.
# - blackmatrix7/ios_rule_script only for categories missing from Accademia, currently OpenAI and Claude.
# - ssd-bk remains manual backup only.

[General]
ip-mode = v4-only
ipv6-vif = off
sni-sniffing = true
disable-stun = true
test-timeout = 5
internet-test-url = http://connectivitycheck.platform.hicloud.com/generate_204
proxy-test-url = http://www.gstatic.com/generate_204
disconnect-on-policy-change = true
dns-server = system
dns-reject-mode = LoopbackIP
domain-reject-mode = DNS
udp-fallback-mode = REJECT
skip-proxy = 192.168.0.0/16,172.16.0.0/12,localhost,*.local,<PERSONAL_DIRECT_DOMAIN>,*.<PERSONAL_DIRECT_DOMAIN>
bypass-tun = 100.64.0.0/10,127.0.0.0/8,169.254.0.0/16,172.16.0.0/12,192.0.0.0/24,192.0.2.0/24,192.88.99.0/24,192.168.0.0/16,198.51.100.0/24,203.0.113.0/24,224.0.0.0/4,255.255.255.255/32
real-ip = *.lan,*.local,localhost.*.qq.com,localhost.*.weixin.qq.com,pool.ntp.org,*.pool.ntp.org,ntp.*.com,time.*.com,stun.*,global.turn.twilio.com,global.stun.twilio.com,<PERSONAL_DIRECT_DOMAIN>,*.<PERSONAL_DIRECT_DOMAIN>
resource-parser = https://raw.githubusercontent.com/sub-store-org/Sub-Store/release/sub-store-parser.loon.min.js
geoip-url = https://geodata.kelee.one/Country-Masaiki.mmdb
ipasn-url = https://geodata.kelee.one/GeoLite2-ASN-P3TERX.mmdb
allow-wifi-access = false
interface-mode = auto

[Proxy]
# WireGuard nodes are injected from private.wg_proxy_lines.
<WG_PROXY_LINES>

[Remote Proxy]
# Daily primary subscriptions, for example Lk2 and wd.
<PRIMARY_PROXY_LINES>
# Manual backup subscriptions, for example ssd-bk.
<BACKUP_PROXY_LINES>

[Remote Filter]
香港节点 = NameRegex,<PRIMARY_NAMES>, FilterKey = "^(?=.*((?i)🇭🇰|香港|(\\b(HK|HKG|Hong)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
台湾节点 = NameRegex,<PRIMARY_NAMES>, FilterKey = "^(?=.*((?i)🇹🇼|台湾|(\\b(TW|TWN|Tai|Taiwan)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
日本节点 = NameRegex,<PRIMARY_NAMES>, FilterKey = "^(?=.*((?i)🇯🇵|日本|东京|大阪|(\\b(JP|JPN|Japan)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
韩国节点 = NameRegex,<PRIMARY_NAMES>, FilterKey = "^(?=.*((?i)🇰🇷|韩国|首尔|(\\b(KR|KOR|Korea)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
新国节点 = NameRegex,<PRIMARY_NAMES>, FilterKey = "^(?=.*((?i)🇸🇬|新加坡|狮|(\\b(SG|SGP|Singapore)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
美国节点 = NameRegex,<PRIMARY_NAMES>, FilterKey = "^(?=.*((?i)🇺🇸|美国|洛杉矶|圣何塞|西雅图|芝加哥|(\\b(US|USA|United States)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
游戏节点 = NameRegex,<PRIMARY_NAMES>, FilterKey = "^(?=.*((?i)游戏|🎮|(\\b(GAME)(\\d+)?\\b)))(?!.*((?i)回国|校园)).*$"
全球节点 = NameRegex,<PRIMARY_NAMES>, FilterKey = "^(?=.*(.))(?!.*((?i)群|邀请|返利|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|通知|国内|地址|频道|说明|教程|更新|作者|(\\b(USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic)(\\d+)?\\b|\\d{4}-\\d{2}-\\d{2}|\\dG))).*$"
备用香港节点 = NameRegex,<BACKUP_NAMES>, FilterKey = "^(?=.*((?i)🇭🇰|香港|(\\b(HK|HKG|Hong)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$"
备用台湾节点 = NameRegex,<BACKUP_NAMES>, FilterKey = "^(?=.*((?i)🇹🇼|台湾|(\\b(TW|TWN|Tai|Taiwan)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$"
备用日本节点 = NameRegex,<BACKUP_NAMES>, FilterKey = "^(?=.*((?i)🇯🇵|日本|东京|大阪|(\\b(JP|JPN|Japan)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$"
备用新国节点 = NameRegex,<BACKUP_NAMES>, FilterKey = "^(?=.*((?i)🇸🇬|新加坡|狮|(\\b(SG|SGP|Singapore)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$"
备用美国节点 = NameRegex,<BACKUP_NAMES>, FilterKey = "^(?=.*((?i)🇺🇸|美国|洛杉矶|圣何塞|西雅图|芝加哥|(\\b(US|USA|United States)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$"
备用全部节点 = NameRegex,<BACKUP_NAMES>, FilterKey = "^(?=.*(.))(?!.*((?i)群|邀请|返利|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|过期|已用|联系|邮箱|工单|通知|国内|地址|频道|说明|教程|更新|作者|(\\b(USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic)(\\d+)?\\b|\\d{4}-\\d{2}-\\d{2}|\\dG))).*$"

[Proxy Group]
主代理 = select,香港策略,台湾策略,日本策略,韩国策略,新国策略,美国策略,游戏手动策略,全球手动策略,备用手动策略,DIRECT
WG_PRIVATE = select,DIRECT,<WG_NODE_NAMES>,img-url = server.rack
PERSONAL_DIRECT = select,DIRECT
SENSITIVE_FIXED = select,美国节点,新国节点,备用手动策略,DIRECT,img-url = lock.shield
BANK-US = select,美国节点,备用美国节点,备用手动策略,DIRECT,img-url = banknote
Crypto = select,新国节点,美国节点,备用新国节点,备用美国节点,备用手动策略,DIRECT,img-url = bitcoinsign.circle
AI = select,新国策略,美国策略,新国节点,美国节点,备用手动策略,DIRECT,img-url = person.circle
Streaming = select,新国策略,日本策略,美国策略,主代理,DIRECT
Social = select,主代理,香港策略,新国策略,美国策略,DIRECT
Tools = select,主代理,香港策略,日本策略,美国策略,DIRECT
香港策略 = select,香港时延优选,香港节点,DIRECT
台湾策略 = select,台湾时延优选,台湾节点,DIRECT
日本策略 = select,日本时延优选,日本节点,DIRECT
韩国策略 = select,韩国时延优选,韩国节点,DIRECT
新国策略 = select,新国时延优选,新国节点,DIRECT
美国策略 = select,美国时延优选,美国节点,DIRECT
游戏手动策略 = select,游戏节点,主代理,DIRECT
全球手动策略 = select,全球节点,主代理,DIRECT
备用手动策略 = select,备用美国节点,备用新国节点,备用香港节点,备用台湾节点,备用日本节点,备用全部节点,DIRECT
香港时延优选 = url-test,香港节点,interval = 300,tolerance = 50
台湾时延优选 = url-test,台湾节点,interval = 300,tolerance = 50
日本时延优选 = url-test,日本节点,interval = 300,tolerance = 50
韩国时延优选 = url-test,韩国节点,interval = 300,tolerance = 50
新国时延优选 = url-test,新国节点,interval = 300,tolerance = 50
美国时延优选 = url-test,美国节点,interval = 300,tolerance = 50

