# Loon Hybrid Optimized Template
#
# 公开安全版本：不包含真实订阅 URL、证书、内网节点、个人域名、敏感网站清单。
#
# 设计目标：
# - 保留当前配置的地区筛选 + 手动/自动策略组结构；
# - 引入本仓库自动生成的 Accademia 分类规则；
# - 敏感网站固定节点访问，禁止负载均衡和自动切换；
# - WireGuard 仅作为内网访问策略，不参与普通代理兜底；
# - 个人调试域名强制 DIRECT，禁止经由代理节点；
# - 备用订阅只作为手动灾备入口，不参与任何自动选择、url-test、load-balance；
# - 默认保持黑名单兜底：FINAL,主代理。

[General]
ip-mode = v4-only
ipv6-vif = off
dns-server = system
sni-sniffing = true
disable-stun = true
dns-reject-mode = LoopbackIP
domain-reject-mode = DNS
udp-fallback-mode = REJECT
allow-wifi-access = false
interface-mode = auto
test-timeout = 5
disconnect-on-policy-change = true
internet-test-url = http://connectivitycheck.platform.hicloud.com/generate_204
proxy-test-url = http://www.gstatic.com/generate_204
resource-parser = https://raw.githubusercontent.com/sub-store-org/Sub-Store/release/sub-store-parser.loon.min.js
geoip-url = https://geodata.kelee.one/Country-Masaiki.mmdb
ipasn-url = https://geodata.kelee.one/GeoLite2-ASN-P3TERX.mmdb

# 私有/局域网/个人直连域名。请在本地把 <PERSONAL_DIRECT_DOMAIN> 替换成你的个人域名。
skip-proxy = 192.168.0.0/16,172.16.0.0/12,localhost,*.local,<PERSONAL_DIRECT_DOMAIN>,*.<PERSONAL_DIRECT_DOMAIN>
bypass-tun = 100.64.0.0/10,127.0.0.0/8,169.254.0.0/16,172.16.0.0/12,192.0.0.0/24,192.0.2.0/24,192.88.99.0/24,192.168.0.0/16,198.51.100.0/24,203.0.113.0/24,224.0.0.0/4,255.255.255.255/32

# 真实 IP 场景：内网、NTP、游戏/语音、个人调试域名等。
real-ip = *.lan,*.local,localhost.*.qq.com,localhost.*.weixin.qq.com,pool.ntp.org,*.pool.ntp.org,ntp.*.com,time.*.com,stun.*,global.turn.twilio.com,global.stun.twilio.com,<PERSONAL_DIRECT_DOMAIN>,*.<PERSONAL_DIRECT_DOMAIN>

[Proxy]
# WireGuard 内网节点：仅在 WG_PRIVATE 策略中使用。
# wg-main = WireGuard, ...

[Remote Proxy]
# 在本地填入订阅 URL。不要把真实 URL 提交到公开仓库。
#
# primary：日常主订阅，参与地区筛选、url-test、业务策略。
# backup：备用订阅，例如 ssd-bk。只作为手动灾备，不参与自动选择。
#
# primary = <SUBSCRIPTION_URL_PRIMARY>,parser-enabled=true,udp=true,block-quic=true,fast-open=default,vmess-aead=true,skip-cert-verify=true,enabled=true,flexible-sni=false
# backup = <SUBSCRIPTION_URL_BACKUP>,parser-enabled=true,udp=true,block-quic=true,fast-open=default,vmess-aead=true,skip-cert-verify=true,enabled=true,flexible-sni=false

[Remote Filter]
# 日常节点池：只使用 primary，不包含 backup。
香港节点 = NameRegex,primary, FilterKey = "^(?=.*((?i)🇭🇰|香港|(\\b(HK|HKG|Hong)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
台湾节点 = NameRegex,primary, FilterKey = "^(?=.*((?i)🇹🇼|台湾|(\\b(TW|TWN|Tai|Taiwan)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
日本节点 = NameRegex,primary, FilterKey = "^(?=.*((?i)🇯🇵|日本|东京|大阪|(\\b(JP|JPN|Japan)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
韩国节点 = NameRegex,primary, FilterKey = "^(?=.*((?i)🇰🇷|韩国|首尔|(\\b(KR|KOR|Korea)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
新国节点 = NameRegex,primary, FilterKey = "^(?=.*((?i)🇸🇬|新加坡|狮|(\\b(SG|SGP|Singapore)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
美国节点 = NameRegex,primary, FilterKey = "^(?=.*((?i)🇺🇸|美国|洛杉矶|圣何塞|西雅图|芝加哥|(\\b(US|USA|United States)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
游戏节点 = NameRegex,primary, FilterKey = "^(?=.*((?i)游戏|🎮|(\\b(GAME)(\\d+)?\\b)))(?!.*((?i)回国|校园)).*$"
全球节点 = NameRegex,primary, FilterKey = "^(?=.*(.))(?!.*((?i)群|邀请|返利|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|通知|国内|地址|频道|说明|教程|更新|作者|(\\b(USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic)(\\d+)?\\b|\\d{4}-\\d{2}-\\d{2}|\\dG))).*$"

# 备用订阅池：只使用 backup，不参与任何 url-test / load-balance。
# 主订阅失效时，在 Loon 界面手动把相关策略切到这些备用节点。
备用香港节点 = NameRegex,backup, FilterKey = "^(?=.*((?i)🇭🇰|香港|(\\b(HK|HKG|Hong)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$"
备用台湾节点 = NameRegex,backup, FilterKey = "^(?=.*((?i)🇹🇼|台湾|(\\b(TW|TWN|Tai|Taiwan)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$"
备用日本节点 = NameRegex,backup, FilterKey = "^(?=.*((?i)🇯🇵|日本|东京|大阪|(\\b(JP|JPN|Japan)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$"
备用新国节点 = NameRegex,backup, FilterKey = "^(?=.*((?i)🇸🇬|新加坡|狮|(\\b(SG|SGP|Singapore)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$"
备用美国节点 = NameRegex,backup, FilterKey = "^(?=.*((?i)🇺🇸|美国|洛杉矶|圣何塞|西雅图|芝加哥|(\\b(US|USA|United States)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮)).*$"
备用全部节点 = NameRegex,backup, FilterKey = "^(?=.*(.))(?!.*((?i)群|邀请|返利|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|过期|已用|联系|邮箱|工单|通知|国内|地址|频道|说明|教程|更新|作者|(\\b(USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic)(\\d+)?\\b|\\d{4}-\\d{2}-\\d{2}|\\dG))).*$"

[Proxy Group]
# 主代理：正常情况下只走 primary 衍生策略；备用手动策略只作为最后的灾备入口。
主代理 = select,香港策略,台湾策略,日本策略,韩国策略,新国策略,美国策略,游戏手动策略,全球手动策略,备用手动策略,DIRECT

# WireGuard 内网：只给内网 CIDR 和你明确指定的私有资源使用。
WG_PRIVATE = select,DIRECT,wg-main,img-url = server.rack

# 个人调试域名：强制直连，避免走节点导致缓存、出口 IP、TLS 或回源问题干扰调试。
PERSONAL_DIRECT = select,DIRECT

# 敏感网站：必须手动固定节点访问，禁止 url-test / load-balance。
# 默认只包含 primary 节点池；如果主订阅失效，再手动切到备用手动策略。
SENSITIVE_FIXED = select,美国节点,新国节点,备用手动策略,DIRECT,img-url = lock.shield
BANK-US = select,美国节点,备用美国节点,备用手动策略,DIRECT,img-url = banknote
Crypto = select,新国节点,美国节点,备用新国节点,备用美国节点,备用手动策略,DIRECT,img-url = bitcoinsign.circle
AI = select,新国策略,美国策略,新国节点,美国节点,备用手动策略,DIRECT,img-url = person.circle
Streaming = select,新国策略,日本策略,美国策略,主代理,DIRECT
Social = select,主代理,香港策略,新国策略,美国策略,DIRECT
Tools = select,主代理,香港策略,日本策略,美国策略,DIRECT

# 手动地区策略组：只使用 primary 节点池。
香港策略 = select,香港时延优选,香港节点,DIRECT
台湾策略 = select,台湾时延优选,台湾节点,DIRECT
日本策略 = select,日本时延优选,日本节点,DIRECT
韩国策略 = select,韩国时延优选,韩国节点,DIRECT
新国策略 = select,新国时延优选,新国节点,DIRECT
美国策略 = select,美国时延优选,美国节点,DIRECT
游戏手动策略 = select,游戏节点,主代理,DIRECT
全球手动策略 = select,全球节点,主代理,DIRECT

# 备用手动策略：只在 primary/主订阅失效时手动选择，不参与自动测速或负载均衡。
备用手动策略 = select,备用美国节点,备用新国节点,备用香港节点,备用台湾节点,备用日本节点,备用全部节点,DIRECT

# 省电建议：url-test 从 60 秒提高到 300 秒。低延迟刚需可单独下调。
香港时延优选 = url-test,香港节点,interval = 300,tolerance = 50
台湾时延优选 = url-test,台湾节点,interval = 300,tolerance = 50
日本时延优选 = url-test,日本节点,interval = 300,tolerance = 50
韩国时延优选 = url-test,韩国节点,interval = 300,tolerance = 50
新国时延优选 = url-test,新国节点,interval = 300,tolerance = 50
美国时延优选 = url-test,美国节点,interval = 300,tolerance = 50

# 可选：默认关闭负载均衡。需要时再打开，且不要用于敏感网站，也不要包含 backup。
# 香港负载均衡 = load-balance,香港节点,interval = 300,max-timeout = 3000,algorithm = round-robin
# 日本负载均衡 = load-balance,日本节点,interval = 300,max-timeout = 3000,algorithm = round-robin
# 新国负载均衡 = load-balance,新国节点,interval = 300,max-timeout = 3000,algorithm = round-robin
# 美国负载均衡 = load-balance,美国节点,interval = 300,max-timeout = 3000,algorithm = round-robin

[Remote Rule]
# 0. 局域网 / 中国区域：尽量前置直连。
https://kelee.one/Tool/Loon/Lsr/LAN_SPLITTER.lsr, policy=DIRECT, tag=LAN, enabled=true
https://kelee.one/Tool/Loon/Lsr/REGION_SPLITTER.lsr, policy=DIRECT, tag=CN REGION, enabled=true

# 1. 广告 / 隐私：只保留一组主规则，避免重复堆叠。
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Advertising/Advertising.list, policy=REJECT, tag=AD, enabled=true

# 2. 中国直连：如 REGION_SPLITTER 已覆盖较好，可按需关闭 China.list。
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/China/China.list, policy=DIRECT, tag=China, enabled=true

# 3. AI：使用本仓库由 Accademia 规则自动转换的细分规则。
https://raw.githubusercontent.com/Anders518/loon-rules/main/rules/OpenAI/OpenAI_Domain.list, policy=AI, tag=OpenAI Domain, enabled=true
https://raw.githubusercontent.com/Anders518/loon-rules/main/rules/OpenAI/OpenAI_IP.list, policy=AI, tag=OpenAI IP, enabled=true
https://raw.githubusercontent.com/Anders518/loon-rules/main/rules/Claude/Claude_Domain.list, policy=AI, tag=Claude Domain, enabled=true
https://raw.githubusercontent.com/Anders518/loon-rules/main/rules/Claude/Claude_IP.list, policy=AI, tag=Claude IP, enabled=true
https://raw.githubusercontent.com/Anders518/loon-rules/main/rules/Gemini/Gemini_Domain.list, policy=AI, tag=Gemini Domain, enabled=true
https://raw.githubusercontent.com/Anders518/loon-rules/main/rules/Gemini/Gemini_IP.list, policy=AI, tag=Gemini IP, enabled=true
https://raw.githubusercontent.com/Anders518/loon-rules/main/rules/Copilot/Copilot_Domain.list, policy=AI, tag=Copilot Domain, enabled=true
https://raw.githubusercontent.com/Anders518/loon-rules/main/rules/Copilot/Copilot_IP.list, policy=AI, tag=Copilot IP, enabled=true

# 4. 金融 / 支付 / Crypto：固定策略，不要负载均衡。
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/PayPal/PayPal.list, policy=SENSITIVE_FIXED, tag=PayPal Sensitive, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Crypto/Crypto.list, policy=Crypto, tag=Crypto, enabled=true

# 5. 社交 / 工具 / 流媒体。
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Telegram/Telegram.list, policy=Social, tag=Telegram, enabled=true
https://raw.githubusercontent.com/Anders518/loon-rules/main/rules/GitHub/GitHub_Domain.list, policy=Tools, tag=GitHub Domain, enabled=true
https://raw.githubusercontent.com/Anders518/loon-rules/main/rules/YouTube/YouTube_Domain.list, policy=Streaming, tag=YouTube Domain, enabled=false
https://raw.githubusercontent.com/Anders518/loon-rules/main/rules/Netflix/Netflix_Domain.list, policy=Streaming, tag=Netflix Domain, enabled=false

# 6. 备用综合 AI 规则：默认关闭，只有上方细分规则缺失时再开。
https://kelee.one/Tool/Loon/Lsr/AI.lsr, policy=AI, tag=AI Backup, enabled=false

[Rule]
# 个人调试域名：本地替换为真实域名；必须放在远程规则和 FINAL 前。
DOMAIN,<PERSONAL_DIRECT_DOMAIN>,PERSONAL_DIRECT
DOMAIN-SUFFIX,<PERSONAL_DIRECT_DOMAIN>,PERSONAL_DIRECT

# WireGuard 内网 CIDR：本地替换为真实 CIDR，例如 10.x.0.0/16。
IP-CIDR,<WG_PRIVATE_CIDR>,WG_PRIVATE,no-resolve

# 敏感网站：只在本地添加，不要提交公开仓库。示例：
# DOMAIN-SUFFIX,<SENSITIVE_BANK_DOMAIN>,SENSITIVE_FIXED
# DOMAIN-SUFFIX,<SENSITIVE_PAYMENT_DOMAIN>,SENSITIVE_FIXED
# DOMAIN-SUFFIX,<SENSITIVE_EXCHANGE_DOMAIN>,Crypto

# 个人高优先级规则示例：按需保留。
# DOMAIN-SUFFIX,example.jp,日本策略
# DOMAIN-KEYWORD,duolingo,主代理
# DOMAIN-KEYWORD,webank,DIRECT

# 前置直连
IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
IP-CIDR,224.0.0.0/4,DIRECT,no-resolve

# 中国 GeoIP 兜底直连。若依赖 REGION_SPLITTER，可保留作为兜底。
GEOIP,CN,DIRECT

# 当前配置方向：黑名单 / 全局兜底代理。
FINAL,主代理

[Host]

[Rewrite]

[Script]

[Plugin]
# 插件建议本地维护；公开模板不写入个人使用清单。
# 注意：MITM、去广告、HTTPDNS、防 DNS 泄漏类插件之间可能重叠，启用前逐个验证。

[Mitm]
# 公开模板不保存证书、passphrase。
# 只有确实需要 Rewrite / Script 解密时才填写 hostname。
skip-server-cert-verify = false
hostname =
