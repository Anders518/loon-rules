https://raw.githubusercontent.com/Anders518/loon-rules/main/rules/Apple/Apple_Domain.list, policy=DIRECT, tag=Apple Domain, enabled=true
https://raw.githubusercontent.com/Anders518/loon-rules/main/rules/MicrosoftAPPs/MicrosoftAPPs_Domain.list, policy=DIRECT, tag=MicrosoftAPPs Domain, enabled=true
